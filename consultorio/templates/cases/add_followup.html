{% extends 'base.html' %}

{% block title %}Agregar Seguimiento - {{ case.case_number }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">
                    <i class="fas fa-plus-circle me-2"></i>Agregar Seguimiento
                </h5>
                <small class="text-muted">Caso: {{ case.case_number }} - {{ case.title }}</small>
            </div>
            <div class="card-body">
                <form method="post" novalidate>
                    {% csrf_token %}
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tipo de Accion *</label>
                            <select name="action_type" class="form-select" required>
                                <option value="">Seleccionar...</option>
                                <option value="NOTE">Nota</option>
                                <option value="MEETING">Reunion</option>
                                <option value="DOCUMENT">Documento</option>
                                <option value="HEARING">Audiencia</option>
                                <option value="CALL">Llamada</option>
                                <option value="EMAIL">Correo</option>
                                <option value="OTHER">Otro</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Fecha de la Accion *</label>
                            <input type="datetime-local" name="action_date" class="form-control" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Descripcion *</label>
                        <textarea name="description" class="form-control" rows="4" required placeholder="Describa las actividades realizadas..."></textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label class="form-label">Proxima Accion</label>
                            <textarea name="next_action" class="form-control" rows="2" placeholder="Describa la proxima accion a realizar..."></textarea>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Fecha Proxima Accion</label>
                            <input type="date" name="next_action_date" class="form-control">
                        </div>
                    </div>
                    
                    <hr>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'case_detail' case.pk %}" class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-left me-2"></i>Volver al Caso
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>Guardar Seguimiento
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
