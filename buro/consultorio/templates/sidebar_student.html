{% load static %}

<aside id="sidebar" data-cy="sideMenu" class="sidebar-drawer fixed inset-y-0 left-0 z-50 w-72 border-r border-black shadow-sm h-screen transition-transform duration-300 ease-in-out transform -translate-x-full lg:translate-x-0 lg:relative lg:inset-auto flex flex-col">
    <div class="flex flex-col h-full">
        <div class="px-4 py-4 border-b sidebar-divider">
            <div class="flex items-center justify-between gap-3">
                <a href="{% url 'student-home' %}" class="flex items-center gap-3 min-w-0">
                    <div class="brand-logo-window">
                        <img src="{% static 'consultorio/logo.svg' %}" alt="Icesi" class="brand-logo-img" />
                    </div>
                </a>
                <button onclick="toggleSidebar()" class="lg:hidden p-2 text-gray-300 hover:text-white hover:bg-gray-800 rounded-lg" aria-label="Cerrar menu lateral">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
        </div>

        <div class="px-4 py-4 border-b sidebar-divider">
            <div class="sidebar-user flex items-center gap-3 min-w-0">
                <div class="w-10 h-10 rounded-full bg-white/10 text-white font-bold flex items-center justify-center shrink-0">
                    {{ user.username|make_list|first|upper }}
                </div>
                <div class="sidebar-expand min-w-0">
                    <p class="text-sm font-semibold text-white truncate">{{ user.get_full_name|default:user.username }}</p>
                    <p class="text-xs text-gray-300 truncate">Estudiante</p>
                </div>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto py-3">
            <a href="{% url 'student-home' %}" class="sidebar-item {% if request.resolver_match.url_name == 'student-home' or request.resolver_match.url_name == 'student-home-legacy' %}active{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                </svg>
                <span class="sidebar-expand">Inicio</span>
            </a>

            <a href="{% url 'student-appointment-list' %}" class="sidebar-item {% if request.resolver_match.url_name == 'student-appointment-list' %}active{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                </svg>
                <span class="sidebar-expand">Citas</span>
            </a>

            <a href="{% url 'student-case-list' %}" class="sidebar-item {% if request.resolver_match.url_name == 'student-case-list' or request.resolver_match.url_name == 'student-case-detail' %}active{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
                <span class="sidebar-expand">Mis Casos</span>
            </a>

            <a href="{% url 'student-send-email' %}" class="sidebar-item {% if request.resolver_match.url_name == 'student-send-email' %}active{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                </svg>
                <span class="sidebar-expand">Enviar Correo</span>
            </a>

            <a href="{% url 'student-notification-list' %}" class="sidebar-item {% if request.resolver_match.url_name == 'student-notification-list' or request.resolver_match.url_name == 'student-notification-mark-read' or request.resolver_match.url_name == 'student-notification-mark-all-read' %}active{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                </svg>
                <span class="sidebar-expand">Notificaciones</span>
            </a>

            <a href="{% url 'student-profile-settings' %}" class="sidebar-item {% if request.resolver_match.url_name == 'student-profile-settings' or request.resolver_match.url_name == 'student-profile-password' %}active{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                <span class="sidebar-expand">Configuracion</span>
            </a>
        </nav>

        <div class="py-2 border-t sidebar-divider">
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="sidebar-item text-red-300 hover:bg-red-950/40 hover:text-red-200">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                    </svg>
                    <span class="sidebar-expand">Cerrar Sesion</span>
                </button>
            </form>
        </div>
    </div>
</aside>
