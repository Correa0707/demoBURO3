{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Buro Legal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-asesor: #5454E9;
            --color-estudiante: #E86839;
            --color-beneficiario: #4CB979;
            --color-admin: #865CF0;
            --color-text-dark: #1f2937;
            --color-text-light: #6b7280;
            --color-bg-light: #ececf0;
            --color-border-soft: #d4d7dd;
            --color-panel-shadow: 0 16px 46px rgba(17, 24, 39, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            font-family: 'Manrope', sans-serif;
            color: var(--color-text-dark);
            background: #ffffff;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .login-wrapper {
            min-height: 100svh;
            display: grid;
            grid-template-columns: minmax(340px, 1fr) minmax(340px, 1fr);
            background: #ffffff;
        }

        .login-hero {
            position: relative;
            background: var(--color-bg-light);
            overflow: hidden;
            isolation: isolate;
            animation: fadeIn 0.5s ease;
        }

        .login-hero::after {
            content: none;
            position: absolute;
            left: -16%;
            right: -8%;
            bottom: -42%;
            height: 62%;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.05));
            transform: rotate(-7deg);
            pointer-events: none;
            z-index: 1;
        }

        .hero-logo {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 3;
            width: min(30vw, 165px);
            max-width: 165px;
        }

        .hero-logo img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 6px 12px rgba(37, 99, 235, 0.18));
        }

        .hero-image-shell {
            position: absolute;
            inset: 0;
            z-index: 2;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center center;
            animation: riseIn 0.55s ease;
        }

        .login-content {
            display: grid;
            place-items: center;
            padding: 44px 56px;
            background: #ffffff;
            animation: fadeIn 0.45s ease;
        }

        .login-container {
            width: min(100%, 440px);
        }

        .login-header {
            margin-bottom: 34px;
        }

        .login-header h1 {
            margin: 0;
            font-family: 'Sora', sans-serif;
            font-size: clamp(1.55rem, 2.2vw, 1.75rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #111827;
            line-height: 1.15;
        }

        .login-header p {
            margin: 9px 0 0;
            font-size: clamp(0.9rem, 1.2vw, 1rem);
            color: var(--color-text-light);
            font-weight: 500;
        }

        .question {
            margin: 0 0 17px;
            font-size: clamp(1.25rem, 1.8vw, 1.5rem);
            font-weight: 700;
            color: #111827;
        }

        .messages {
            margin-bottom: 16px;
            display: grid;
            gap: 8px;
        }

        .message {
            border-radius: 8px;
            padding: 11px 13px;
            border: 1px solid;
            font-size: 0.925rem;
            line-height: 1.35;
            box-shadow: var(--color-panel-shadow);
        }

        .message-error {
            background: #fef2f2;
            color: #b91c1c;
            border-color: #fecaca;
        }

        .message-success {
            background: #f0fdf4;
            color: #166534;
            border-color: #bbf7d0;
        }

        .message-info {
            background: #eff6ff;
            color: #1d4ed8;
            border-color: #bfdbfe;
        }

        .role-buttons {
            display: grid;
            gap: 14px;
            margin: 8px 0 0;
            padding: 0;
            border: 0;
            min-inline-size: 0;
        }

        .role-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 54px;
            padding: 13px 22px;
            border-width: 2px;
            border-style: solid;
            border-radius: 0;
            background: #ffffff;
            font-size: 0.98rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            text-align: center;
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, transform 0.2s ease;
            cursor: pointer;
            user-select: none;
        }

        .role-btn:hover {
            transform: translateY(-1px);
        }

        .role-btn:focus-visible {
            outline: 3px solid #0f172a;
            outline-offset: 2px;
        }

        .btn-asesor {
            border-color: var(--color-asesor);
            color: var(--color-asesor);
        }

        .btn-asesor:hover {
            background: #eff6ff;
            border-color: #1e40af;
            color: #1e40af;
        }

        .btn-estudiante {
            border-color: var(--color-estudiante);
            color: var(--color-estudiante);
        }

        .btn-estudiante:hover {
            background: #fff7ed;
            border-color: #c2410c;
            color: #c2410c;
        }

        .btn-beneficiario {
            border-color: var(--color-beneficiario);
            color: var(--color-beneficiario);
        }

        .btn-beneficiario:hover {
            background: #f0fdf4;
            border-color: #166534;
            color: #166534;
        }

        .btn-admin {
            border-color: var(--color-admin);
            color: var(--color-admin);
        }

        .btn-admin:hover {
            background: #faf5ff;
            border-color: #6d28d9;
            color: #6d28d9;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 1024px) {
            .login-content {
                padding: 34px 40px;
            }

            .login-container {
                width: min(100%, 400px);
            }
        }

        @media (max-width: 767px) {
            .login-wrapper {
                grid-template-columns: 1fr;
                min-height: 100svh;
            }

            .login-hero {
                display: none;
            }

            .login-content {
                min-height: 100svh;
                padding: 28px 20px;
            }

            .login-container {
                width: min(100%, 520px);
            }

            .login-header {
                margin-bottom: 26px;
            }

            .question {
                margin-bottom: 14px;
            }

            .role-buttons {
                gap: 12px;
            }

            .role-btn {
                min-height: 52px;
                padding: 12px 18px;
            }
        }

        @media (max-width: 479px) {
            .login-content {
                padding: 18px 16px;
            }

            .login-header h1 {
                font-size: 1.42rem;
            }

            .login-header p {
                font-size: 0.92rem;
            }

            .question {
                font-size: 1.26rem;
            }

            .role-btn {
                min-height: 50px;
                padding: 11px 15px;
                font-size: 0.94rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <aside class="login-hero" aria-hidden="true">
            <div class="hero-logo">
                <img src="{% static 'consultorio/images/logo-icesi-azul.svg' %}" alt="Logo Icesi">
            </div>
            <div class="hero-image-shell">
                <img src="{% static 'consultorio/images/hero.png' %}" alt="Profesionales de derecho" class="hero-image">
            </div>
        </aside>

        <main class="login-content">
            <section class="login-container" aria-labelledby="login-title">
                <header class="login-header">
                    <h1 id="login-title">Login Buro</h1>
                    <p>Consultorio juridico</p>
                </header>

                {% if messages %}
                <div class="messages" role="status" aria-live="polite">
                    {% for message in messages %}
                    <div class="message {% if message.tags == 'error' %}message-error{% elif message.tags == 'success' %}message-success{% else %}message-info{% endif %}">
                        {{ message }}
                    </div>
                    {% endfor %}
                </div>
                {% endif %}

                <form method="post" action="{% url 'unified-login' %}">
                    {% csrf_token %}

                    <h2 class="question">Quien eres?</h2>
                    <div class="role-buttons" role="group" aria-label="Selecciona un tipo de usuario">
                        <button type="submit" name="user_type" value="advisor" class="role-btn btn-asesor">Soy un asesor o docente</button>
                        <button type="submit" name="user_type" value="student" class="role-btn btn-estudiante">Soy un estudiante</button>
                        <button type="submit" name="user_type" value="beneficiary" class="role-btn btn-beneficiario">Soy un beneficiario</button>
                        <button type="submit" name="user_type" value="admin" class="role-btn btn-admin">Soy un admin</button>
                    </div>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
